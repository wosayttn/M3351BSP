name: SBOM and CVE Scan

on:
  push:
  workflow_dispatch:

jobs:
  security_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # 1. Install tools
      # =========================
      - name: Install Syft & Grype
        run: |
          mkdir -p /opt
          cd /opt
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh
          /opt/bin/syft version
          /opt/bin/grype version

      # ==========================================
      # 2. Run SBOM & SCA Generation Script
      # ==========================================
      - name: Generate SBOM, CVE Scan, and SCA Reports
        run: |
          python3 .github/workflows/generate_sbom_sca.py
    
      # =========================
      # 3. Policy Gate (Critical fail)
      # =========================
      - name: Fail on Critical CVE
        run: |
          cat cve-report.json
          CRITICAL=$(cat cve-report.json | grep -i "Critical" || true)
          if [ ! -z "$CRITICAL" ]; then
            echo "Critical CVE found!"
            #exit 1
          fi

      # =========================
      # 4. Upload artifacts
      # =========================
      - name: Upload SCA Reports Bundle
        uses: actions/upload-artifact@v4
        with:
          name: sca-reports
          path: sca-reports.zip
