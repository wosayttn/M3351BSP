project:
  packs:
    - pack: Nuvoton::NuMicroM33_DFP
  setups:
    - output:
        # bin, elf, hex, lib
        type: bin
    - setup: Options for Project
      processor:
        fpu: sp
        mve: off
        endian: little
        trustzone: secure
      add-path:
        - ../../../../../Library/CMSIS/Core/Include
        - ../../../../../Library/CMSIS/Compiler/include
        - ../../../../../Library/Device/Nuvoton/M3351/Include
        - ../../../../../Library/StdDriver/inc
        - ../..
        - ../../../../../ThirdParty/FreeRTOS/Source/portable/GCC/ARM_CM33/secure
      misc:
        - for-compiler: AC6
          C:
            - -std=c11
          C-CPP:
            - -fno-rtti -funsigned-char -fshort-enums -fshort-wchar -ffunction-sections -fdata-sections -Wall
            - -D__MICROLIB
          CPP:
            - -xc++
            - -std=c++11
          ASM:
            - -masm=auto
          Link:
            - --library_type=microlib --map --load_addr_map_info --xref --callgraph --symbols
            - --info sizes --info totals --info unused --info veneers
            - --strict --summary_stderr --info summarysizes
            - --import-cmse-lib-out "../../CMSELib/nsclib_keil.o"
        - for-compiler: GCC
          C:
            - -std=gnu11
          C-CPP:
            - -mthumb -masm-syntax-unified -fmessage-length=0 -fsigned-char -ffunction-sections -fdata-sections
          Link:
            - -mthumb -fmessage-length=0 -fsigned-char --specs=nano.specs --specs=nosys.specs
            - -Wl,--cmse-implib
            - -Wl,--out-implib="../../CMSELib/nsclib_gcc.o"
            - -Wl,--gc-sections,-Map="$elf()$.map"
            - -Wl,--no-warn-rwx-segments
  linker:
    - script: ../Keil/Secure.scf
      for-compiler: AC6
    - script: M3351_s.ld
      for-compiler: GCC
  groups:
    - group: CMSIS
      files:
        - file: ../../../../../Library/Device/Nuvoton/M3351/Source/startup_M3351.c
        - file: ../../../../../Library/Device/Nuvoton/M3351/Source/system_M3351.c
    - group: Library
      files:
        - file: ../../../../../Library/StdDriver/src/retarget.c
        - file: ../../../../../Library/StdDriver/src/clk.c
        - file: ../../../../../Library/StdDriver/src/sys.c
        - file: ../../../../../Library/StdDriver/src/uart.c
        - file: ../../../../../Library/StdDriver/src/gpio.c
        - file: ../../../../../Library/StdDriver/src/fmc.c
    - group: User
      files:
        - file: ../../partition_M3351.h
        - file: ../main_s.c
    - group: NSCFunctions
      files:
        - file: ../../tz_demo/nsc_functions.c
    - group: SecureContext
      files:
        - file: ../../../../../ThirdParty/FreeRTOS/Source/portable/GCC/ARM_CM33/secure/secure_context.c
        - file: ../../../../../ThirdParty/FreeRTOS/Source/portable/GCC/ARM_CM33/secure/secure_context_port.c
    - group: SecureInit
      files:
        - file: ../../../../../ThirdParty/FreeRTOS/Source/portable/GCC/ARM_CM33/secure/secure_init.c
    - group: SecureHeap
      files:
        - file: ../../../../../ThirdParty/FreeRTOS/Source/portable/GCC/ARM_CM33/secure/secure_heap.c
